# Netlify build config for the v2 web app.
#
# v2 is a pnpm workspace monorepo. The build runs from repo root so
# pnpm can resolve workspace packages (@pin/abi, @pin/addresses,
# @pin/shared, @pin/token-metadata). Only the web app is built here;
# worker + indexer run on Railway.
#
# Worker + indexer + Postgres are NOT built by Netlify. They live on
# Railway and the web app reads from the Railway Postgres over the
# public endpoint via DATABASE_URL.

[build]
  command = "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @pin/web build"
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION = "22.19.0"
  # PND treasury: receives the FixedPriceMinter referral share on mints made
  # through this site (pndReferrerAddress in lib/collection.ts).
  NEXT_PUBLIC_PND_REFERRAL_ADDRESS = "0xea194A186EBe76A84E2B2027f5f23F81939c05AD"
  # Force pnpm via corepack so the lockfile is honored. Without this
  # Netlify may try to use npm and fail on the workspace protocol.
  NPM_FLAGS = "--version"

# Next.js runtime plugin — Netlify auto-installs this for Next.js
# projects, but we pin it explicitly so build behavior is reproducible.
[[plugins]]
  package = "@netlify/plugin-nextjs"
