[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
remappings = [
    "openzeppelin-contracts/=lib/openzeppelin-contracts/",
    "openzeppelin-contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/",
    "erc721a-upgradeable/=lib/ERC721A-Upgradeable/",
    "forge-std/=lib/forge-std/src/",
]

[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"

# Etherscan v2 API (single multichain key). Lets `forge script ... --verify`
# and ad-hoc `forge verify-contract` runs work without re-passing the API key
# on every command. Still resolved from env so it never lives in the repo.
[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}", chain = 1 }
