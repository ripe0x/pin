app = "pin-indexer"
primary_region = "ewr"

[build]
  dockerfile = "Dockerfile"
  # Build context is the monorepo root (two levels up)
  # Deploy with: fly deploy --config apps/indexer/fly.toml --dockerfile apps/indexer/Dockerfile .

[env]
  PORT = "42069"
  NODE_ENV = "production"

[http_service]
  internal_port = 42069
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
