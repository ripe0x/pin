name: Indexer drift check

# Nightly probe of /api/cron/indexer-drift-check. Detects and
# forward-fixes Ponder factory_addresses gaps (where realtime sync
# missed inserting a newly-deployed clone). The route itself only
# inserts the missing rows — past missed events still need a manual
# DROP SCHEMA ponder CASCADE to replay; the workflow surfaces that
# need by failing red when `requires_manual_reindex: true` so the
# GitHub email / repo notification fires.
#
# Setup (one-time):
#   - Add repo SECRET `INDEXER_DRIFT_CHECK_SECRET` = the same value as
#     REVALIDATE_SECRET on the Netlify env. Settings →
#     Secrets and variables → Actions → New repository secret.
#   - (Optional) Add repo VARIABLE `INDEXER_DRIFT_CHECK_URL` if the
#     full URL ever needs to differ from the default below. Same UI,
#     "Variables" tab.
#
# Run manually with: Actions → "Indexer drift check" → Run workflow.

on:
  schedule:
    # 05:00 UTC daily ≈ 1am EDT / 12am EST — site traffic trough.
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Hit /api/cron/indexer-drift-check
        env:
          URL: ${{ vars.INDEXER_DRIFT_CHECK_URL || 'https://pnd.ripe.wtf/api/cron/indexer-drift-check' }}
          SECRET: ${{ secrets.INDEXER_DRIFT_CHECK_SECRET }}
        run: |
          set -euo pipefail
          if [[ -z "${SECRET}" ]]; then
            echo "::error::INDEXER_DRIFT_CHECK_SECRET is unset"
            exit 1
          fi

          # Single POST. --fail-with-body returns nonzero on >=400 but
          # still emits the response body so we can see the error.
          response=$(curl -sS --fail-with-body \
            -X POST "${URL}?secret=${SECRET}" \
            -H "Accept: application/json")

          echo "$response" | jq .

          repaired=$(echo "$response" | jq -r '.repaired // 0')
          requires=$(echo "$response" | jq -r '.requires_manual_reindex // false')

          if [[ "${repaired}" -gt 0 ]]; then
            echo "::warning::Backfilled ${repaired} factory_addresses rows"
          fi

          # Fail the run when a manual reindex is needed — turns the
          # missed-events case into a visible alert (GitHub email,
          # red X in the Actions tab) instead of a silent log.
          if [[ "${requires}" == "true" ]]; then
            echo "::error::factory_addresses drift was repaired (${repaired} rows). Past missed events on those clones require a manual reindex: connect to the Ponder DB and run \`DROP SCHEMA ponder CASCADE\`. Ponder will auto-restart on Railway and replay handlers from cached ponder_sync.logs (no RPC re-fetch)."
            exit 1
          fi

          echo "No drift detected."
